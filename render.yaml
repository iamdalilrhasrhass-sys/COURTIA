services:
  # Backend API Service
  - type: web
    name: crm-assurance-api
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: cd backend && npm install
    preDeployCommand: cd backend && npm run migrate
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        value: https://courtia.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: crm-assurance-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false

databases:
  - name: crm-assurance-db
    databaseName: crm_assurance
    region: frankfurt
    plan: starter
