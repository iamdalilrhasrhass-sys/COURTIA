services:
  # Backend API Service
  - type: web
    name: crm-assurance-api
    env: node
    region: frankfurt
    plan: starter
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FRONTEND_URL
        value: https://crm-assurance.vercel.app
    healthCheckPath: /health
    healthCheckInterval: 30

  # PostgreSQL Database
  - type: pserv
    name: crm-assurance-db
    env: postgres
    plan: starter
    region: frankfurt
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all (configure firewall in production)
    databaseName: crm_assurance
    databaseUser: postgres
    envVars:
      - key: POSTGRES_PASSWORD
        generateValue: true

  # Redis Cache (optional)
  - type: redis
    name: crm-assurance-redis
    region: frankfurt
    plan: starter
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow from backend
